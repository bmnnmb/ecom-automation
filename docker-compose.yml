# ============================================
# Hermes 多平台电商自动化系统 - Docker Compose
# ============================================
# 使用方法:
#   cp .env.example .env   # 复制并编辑环境变量
#   docker compose up -d   # 启动所有服务
#   docker compose logs -f # 查看日志
#   docker compose down    # 停止所有服务
#
# 端口分配: 参见 docs/DEPLOY.md 端口分配表
# Redis DB 分配: 每个服务使用独立 DB 避免 key 冲突
# ============================================

services:
  # ─────────────── 基础设施 ───────────────

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_automation
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecom2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom -d ecom_automation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # MongoDB 竞品爬虫存储
  mongodb:
    image: mongo:7
    container_name: ecom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: competitor_crawler
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────── 微服务 ───────────────

  # API 网关 (端口 8000, Redis DB 0)
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # 抖店适配器 (端口 8001, Redis DB 1)
  douyin-adapter:
    build:
      context: ./services/douyin-adapter
      dockerfile: Dockerfile
    container_name: ecom-douyin-adapter
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/1
      DOUYIN_APP_KEY: ${DOUYIN_APP_KEY:-}
      DOUYIN_APP_SECRET: ${DOUYIN_APP_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # 快手适配器 (端口 8002, Redis DB 2)
  kuaishou-adapter:
    build:
      context: ./services/kuaishou-adapter
      dockerfile: Dockerfile
    container_name: ecom-kuaishou-adapter
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/2
      KUAISHOU_APP_KEY: ${KUAISHOU_APP_KEY:-}
      KUAISHOU_APP_SECRET: ${KUAISHOU_APP_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # 拼多多客服适配器 (端口 8003, Redis DB 3)
  pdd-cs-adapter:
    build:
      context: ./services/pdd-cs-adapter
      dockerfile: Dockerfile
    container_name: ecom-pdd-cs-adapter
    restart: unless-stopped
    ports:
      - "8003:8003"
      - "127.0.0.1:6080:6080"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/3
      PDD_CLIENT_ID: ${PDD_CLIENT_ID:-}
      PDD_CLIENT_SECRET: ${PDD_CLIENT_SECRET:-}
      PDD_ACCESS_TOKEN: ${PDD_ACCESS_TOKEN:-}
      PDD_USERNAME: ${PDD_USERNAME:-}
      PDD_PASSWORD: ${PDD_PASSWORD:-}
      PDD_DATA_DIR: /app/data
      BROWSER_HEADLESS: "true"
      BROWSER_CONTROL_URL: "http://localhost:6080/vnc.html?autoconnect=true&resize=scale"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - pdd_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # 闲鱼适配器 (端口 8004, Redis DB 4)
  xianyu-adapter:
    build:
      context: ./services/xianyu-adapter
      dockerfile: Dockerfile
    container_name: ecom-xianyu-adapter
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: sqlite:////app/data/xianyu.db
      REDIS_URL: redis://redis:6379/4
      XIANYU_COOKIE: ${XIANYU_COOKIE:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - xianyu_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # OMS 订单管理服务 (端口 8005, Redis DB 5)
  oms-service:
    build:
      context: ./services/oms-service
      dockerfile: Dockerfile
    container_name: ecom-oms-service
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # RAG 知识库服务 (端口 8009, Redis DB 6)
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: ecom-rag-service
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/6
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  # Hermes 控制中心 (端口 8007, Redis DB 7)
  hermes-control:
    build:
      context: ./services/hermes-control
      dockerfile: Dockerfile
    container_name: ecom-hermes-control
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/7
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # 竞品爬虫 (端口 8008, Redis DB 8)
  competitor-crawler:
    build:
      context: ./services/competitor-crawler
      dockerfile: Dockerfile
    container_name: ecom-competitor-crawler
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/8
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DATABASE: competitor_crawler
      DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - competitor_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # 商品管理服务 (端口 8006, SQLite 独立数据库)
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: ecom-product-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - product_data:/app/data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ─────────────── 工具服务 ───────────────

  # n8n 工作流引擎
  n8n:
    image: n8nio/n8n
    container_name: ecom-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-n8n2024}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ecom_automation
      DB_POSTGRESDB_USER: ecom
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-ecom2024}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # Metabase BI 数据可视化
  metabase:
    image: metabase/metabase
    container_name: ecom-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  product_data:
    driver: local
  xianyu_data:
    driver: local
  competitor_data:
    driver: local
  pdd_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  metabase_data:
    driver: local

networks:
  ecom-network:
    driver: bridge
