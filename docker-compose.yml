# ============================================
# Hermes 多平台电商自动化系统 - Docker Compose
# ============================================
# 使用方法:
#   cp .env.example .env   # 复制并编辑环境变量
#   docker compose up -d   # 启动所有服务
#   docker compose logs -f # 查看日志
#   docker compose down    # 停止所有服务
# ============================================

version: '3.8'

services:
  # ─────────────── 基础设施 ───────────────

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_automation
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecom2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom -d ecom_automation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── 微服务 ───────────────

  # API 网关 (端口 8000)
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # 抖店适配器 (端口 8001)
  douyin-adapter:
    build:
      context: ./services/douyin-adapter
      dockerfile: Dockerfile
    container_name: ecom-douyin-adapter
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/1
      DOUYIN_APP_KEY: ${DOUYIN_APP_KEY:-}
      DOUYIN_APP_SECRET: ${DOUYIN_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # 快手适配器 (端口 8002)
  kuaishou-adapter:
    build:
      context: ./services/kuaishou-adapter
      dockerfile: Dockerfile
    container_name: ecom-kuaishou-adapter
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/2
      KUAISHOU_APP_KEY: ${KUAISHOU_APP_KEY:-}
      KUAISHOU_APP_SECRET: ${KUAISHOU_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # 拼多多客服适配器 (端口 8003)
  pdd-cs-adapter:
    build:
      context: ./services/pdd-cs-adapter
      dockerfile: Dockerfile
    container_name: ecom-pdd-cs-adapter
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/3
      PDD_CLIENT_ID: ${PDD_CLIENT_ID:-}
      PDD_CLIENT_SECRET: ${PDD_CLIENT_SECRET:-}
      PDD_ACCESS_TOKEN: ${PDD_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # 闲鱼适配器 (端口 8004)
  xianyu-adapter:
    build:
      context: ./services/xianyu-adapter
      dockerfile: Dockerfile
    container_name: ecom-xianyu-adapter
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/4
      XIANYU_COOKIE: ${XIANYU_COOKIE:-}
      AI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # OMS 订单管理服务 (端口 8005)
  oms-service:
    build:
      context: ./services/oms-service
      dockerfile: Dockerfile
    container_name: ecom-oms-service
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # RAG 知识库服务 (端口 8006)
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: ecom-rag-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      RAG_SERVICE_PORT: 8006
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/6
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # Hermes 控制中心 (端口 8007)
  hermes-control:
    build:
      context: ./services/hermes-control
      dockerfile: Dockerfile
    container_name: ecom-hermes-control
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/7
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # 竞品爬虫服务 (端口 8008)
  competitor-crawler:
    build:
      context: ./services/competitor-crawler
      dockerfile: Dockerfile
    container_name: ecom-competitor-crawler
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://ecom:${DB_PASSWORD:-ecom2024}@postgres:5432/ecom_automation
      REDIS_URL: redis://redis:6379/8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # ─────────────── 工具服务 ───────────────

  # n8n 工作流引擎
  n8n:
    image: n8nio/n8n
    container_name: ecom-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-n8n2024}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ecom_automation
      DB_POSTGRESDB_USER: ecom
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-ecom2024}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-network

  # Metabase BI 数据可视化
  metabase:
    image: metabase/metabase
    container_name: ecom-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ecom_automation
      MB_DB_PORT: 5432
      MB_DB_USER: ecom
      MB_DB_PASS: ${DB_PASSWORD:-ecom2024}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ecom-network:
    driver: bridge
